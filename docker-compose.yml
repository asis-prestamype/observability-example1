version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: koa-observability-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/observability
      - OTEL_SERVICE_NAME=koa-observability-api
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - OTEL_TRACES_EXPORTER=jaeger
      - OTEL_LOGS_EXPORTER=console
      - OTEL_NODE_DISABLED_INSTRUMENTATIONS=""
      - LOG_LEVEL=debug
    depends_on:
      - mongodb
      - jaeger
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src:ro
      # Mount package files for dependency changes
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Mount node_modules to persist installations
      - node_modules_cache:/app/node_modules
    networks:
      - observability-network
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: observability
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - observability-network

  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
      - "14250:14250"  # Jaeger gRPC
      - "6832:6832/udp"  # Jaeger agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - observability-network

volumes:
  mongodb_data:
  node_modules_cache:

networks:
  observability-network:
    driver: bridge